<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%" style="background-color: #ffffff; font-family: 'Courier New', Courier, monospace;">
  <!-- Grid Background for Technical Look -->
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#f0f0f0" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#grid)" />

  <!-- Drawing Border -->
  <rect x="15" y="15" width="770" height="570" fill="none" stroke="#000000" stroke-width="2"/>
  <rect x="20" y="20" width="760" height="560" fill="none" stroke="#000000" stroke-width="0.5"/>

  <!-- TITLE BLOCK (Штамп чертежа) -->
  <g transform="translate(530, 480)">
    <rect width="250" height="100" fill="#ffffff" stroke="#000000" stroke-width="1.5"/>
    <line x1="0" y1="30" x2="250" y2="30" stroke="#000000" stroke-width="1"/>
    <line x1="0" y1="65" x2="250" y2="65" stroke="#000000" stroke-width="1"/>
    <line x1="125" y1="30" x2="125" y2="100" stroke="#000000" stroke-width="1"/>
    
    <text x="10" y="20" font-size="12" font-weight="bold" fill="#000000">Накладка Nissan Tiida</text>
    <text x="10" y="45" font-size="10" fill="#666666">РАЗРАБОТЧИК</text>
    <text x="10" y="58" font-size="11" font-weight="bold" fill="#000000">Antigravity AI</text>
    <text x="135" y="45" font-size="10" fill="#666666">ДАТА</text>
    <text x="135" y="58" font-size="11" font-weight="bold" fill="#000000">2026-06-04</text>
    <text x="10" y="80" font-size="10" fill="#666666">МАСШТАБ</text>
    <text x="10" y="93" font-size="11" font-weight="bold" fill="#000000">1:2 (A4)</text>
    <text x="135" y="80" font-size="10" fill="#666666">ТИП ДОК.</text>
    <text x="135" y="93" font-size="11" font-weight="bold" fill="#000000">ЧЕРТЕЖ ДЕТАЛИ</text>
  </g>

  <!-- VIEW 1: FRONT VIEW (Вид спереди) - Scale 2x -->
  <!-- Real: 290w (top), 285w (bottom), 25h. 2x Scale: 580w, 570w, 50h -->
  <!-- Center is X=300, Y=25 local coordinates. Top spans 10 to 590, Bottom spans 15 to 585 -->
  <g transform="translate(80, 240)">
    <text x="10" y="-35" font-size="14" font-weight="bold" fill="#000000">ВИД СПЕРЕДИ</text>
    
    <!-- Trapezoid Outline -->
    <polygon points="10,0 590,0 585,50 15,50" fill="none" stroke="#000000" stroke-width="2"/>
    
    <!-- Hidden Lines for Side Clips (Dashed) -->
    <!-- Centered vertically (Y=25px). Clip spans Y=13px to Y=37px (width 24px/12mm) -->
    <!-- Left side clip -->
    <rect x="24.5" y="13" width="10" height="24" fill="none" stroke="#999999" stroke-width="1" stroke-dasharray="3,3" />
    <!-- Right side clip -->
    <rect x="565.5" y="13" width="10" height="24" fill="none" stroke="#999999" stroke-width="1" stroke-dasharray="3,3" />

    <!-- Center Line -->
    <line x1="300" y1="-10" x2="300" y2="60" stroke="#ff0000" stroke-width="0.8" stroke-dasharray="10,2,2,2" />

    <!-- Dimensions for Front View -->
    <!-- Top Width: 290.0 -->
    <line x1="10" y1="-5" x2="10" y2="-25" stroke="#0000ff" stroke-width="0.8" />
    <line x1="590" y1="-5" x2="590" y2="-25" stroke="#0000ff" stroke-width="0.8" />
    <line x1="20" y1="-20" x2="580" y2="-20" stroke="#0000ff" stroke-width="0.8" />
    <polygon points="10,-20 20,-23 20,-17" fill="#0000ff" />
    <polygon points="590,-20 580,-23 580,-17" fill="#0000ff" />
    <text x="280" y="-25" font-size="11" fill="#0000ff" font-weight="bold">290.0</text>

    <!-- Bottom Width: 285.0 -->
    <line x1="15" y1="55" x2="15" y2="75" stroke="#0000ff" stroke-width="0.8" />
    <line x1="585" y1="55" x2="585" y2="75" stroke="#0000ff" stroke-width="0.8" />
    <line x1="25" y1="70" x2="575" y2="70" stroke="#0000ff" stroke-width="0.8" />
    <polygon points="15,70 25,67 25,73" fill="#0000ff" />
    <polygon points="585,70 575,67 575,73" fill="#0000ff" />
    <text x="280" y="82" font-size="11" fill="#0000ff" font-weight="bold">285.0</text>

    <!-- Height: 25.0 -->
    <line x1="600" y1="0" x2="620" y2="0" stroke="#0000ff" stroke-width="0.8" />
    <line x1="600" y1="50" x2="620" y2="50" stroke="#0000ff" stroke-width="0.8" />
    <line x1="615" y1="10" x2="615" y2="40" stroke="#0000ff" stroke-width="0.8" />
    <polygon points="615,0 612,10 618,10" fill="#0000ff" />
    <polygon points="615,50 612,40 618,40" fill="#0000ff" />
    <text x="625" y="30" font-size="11" fill="#0000ff" font-weight="bold">25.0</text>

    <!-- Slant Side: 26.0 -->
    <line x1="5" y1="10" x2="-10" y2="25" stroke="#0000ff" stroke-width="0.8" />
    <text x="-26" y="20" font-size="10.5" fill="#0000ff" font-weight="bold">26.0</text>
  </g>

  <!-- VIEW 2: TOP VIEW (Вид сверху) - Scale 2x -->
  <!-- Width: 580. Flat Panel. Clips extend UP (back faces negative Y) -->
  <g transform="translate(80, 110)">
    <text x="10" y="-25" font-size="14" font-weight="bold" fill="#000000">ВИД СВЕРХУ</text>
    
    <!-- Flat Panel Profile -->
    <path d="M 10,15 L 590,15 L 590,11 L 10,11 Z" fill="none" stroke="#000000" stroke-width="2"/>
    
    <!-- Left Side Clip extending upward (backwards) from back face at Y=11 -->
    <rect x="24.5" y="-11" width="10" height="22" fill="none" stroke="#000000" stroke-width="1.5" />
    <!-- Tooth pointing to the left -->
    <polygon points="24.5,3 14.5,-5 24.5,-11" fill="#000000" stroke="#000000" stroke-width="1"/>
    
    <!-- Right Side Clip extending upward (backwards) from back face at Y=11 -->
    <rect x="565.5" y="-11" width="10" height="22" fill="none" stroke="#000000" stroke-width="1.5" />
    <!-- Tooth pointing to the right -->
    <polygon points="575.5,3 585.5,-5 575.5,-11" fill="#000000" stroke="#000000" stroke-width="1"/>

    <!-- Center Line -->
    <line x1="300" y1="0" x2="300" y2="45" stroke="#ff0000" stroke-width="0.8" stroke-dasharray="10,2,2,2" />

    <!-- Dimensions for Top View -->
    <!-- Thickness: 2.0 -->
    <line x1="10" y1="11" x2="-10" y2="11" stroke="#0000ff" stroke-width="0.8" />
    <line x1="10" y1="15" x2="-10" y2="15" stroke="#0000ff" stroke-width="0.8" />
    <text x="-32" y="17" font-size="11" fill="#0000ff" font-weight="bold">2.0</text>
  </g>

  <g transform="translate(240, 420)">
    <text x="0" y="-68" font-size="14" font-weight="bold" fill="#000000">ДЕТАЛЬ КЛИПСЫ</text>
    
    <!-- Clip Profile (L-Shape Hook) rotated for side orientation -->
    <path d="M 0,0 L 44,0 L 44,-20 L 32,-40 L 16,-20 L 0,-20 Z" fill="none" stroke="#000000" stroke-width="2.5" />
    <!-- Panel attachment reference -->
    <path d="M 0,10 L 0,-30" stroke="#666666" stroke-width="1.5" stroke-dasharray="4,2"/>
    
    <!-- Dimensions for Clip -->
    <!-- Base Length: 11.0 -->
    <line x1="0" y1="5" x2="0" y2="20" stroke="#0000ff" stroke-width="0.8" />
    <line x1="44" y1="5" x2="44" y2="20" stroke="#0000ff" stroke-width="0.8" />
    <line x1="0" y1="15" x2="44" y2="15" stroke="#0000ff" stroke-width="0.8" />
    <polygon points="0,15 8,12 8,18" fill="#0000ff" />
    <polygon points="44,15 36,12 36,18" fill="#0000ff" />
    <text x="14" y="27" font-size="11" fill="#0000ff" font-weight="bold">11.0</text>

    <!-- Clip base thickness: 5.0 -->
    <line x1="0" y1="-20" x2="-20" y2="-20" stroke="#0000ff" stroke-width="0.8" />
    <line x1="0" y1="0" x2="-20" y2="0" stroke="#0000ff" stroke-width="0.8" />
    <line x1="-15" y1="-5" x2="-15" y2="-15" stroke="#0000ff" stroke-width="0.8" />
    <polygon points="-15,-20 -18,-14 -12,-14" fill="#0000ff" />
    <polygon points="-15,0 -18,-6 -12,-6" fill="#0000ff" />
    <text x="-45" y="-5" font-size="11" fill="#0000ff" font-weight="bold">5.0</text>

    <!-- Flat length: 4.0 -->
    <line x1="0" y1="-20" x2="0" y2="-55" stroke="#0000ff" stroke-width="0.8" stroke-dasharray="2,2" />
    <line x1="16" y1="-20" x2="16" y2="-43" stroke="#0000ff" stroke-width="0.8" />
    <line x1="0" y1="-38" x2="16" y2="-38" stroke="#0000ff" stroke-width="0.8" />
    <polygon points="0,-38 6,-41 6,-35" fill="#0000ff" />
    <polygon points="16,-38 10,-41 10,-35" fill="#0000ff" />
    <text x="4" y="-43" font-size="11" fill="#0000ff" font-weight="bold">4.0</text>

    <!-- Peak Location: 8.0 -->
    <line x1="32" y1="-40" x2="32" y2="-55" stroke="#0000ff" stroke-width="0.8" stroke-dasharray="2,2" />
    <line x1="0" y1="-50" x2="32" y2="-50" stroke="#0000ff" stroke-width="0.8" />
    <polygon points="0,-50 6,-53 6,-47" fill="#0000ff" />
    <polygon points="32,-50 26,-53 26,-47" fill="#0000ff" />
    <text x="12" y="-55" font-size="11" fill="#0000ff" font-weight="bold">8.0</text>

    <!-- Hook height: 5.0 -->
    <line x1="32" y1="-20" x2="52" y2="-20" stroke="#0000ff" stroke-width="0.8" />
    <line x1="32" y1="-40" x2="52" y2="-40" stroke="#0000ff" stroke-width="0.8" />
    <line x1="47" y1="-37" x2="47" y2="-23" stroke="#0000ff" stroke-width="0.8" />
    <polygon points="47,-40 44,-34 50,-34" fill="#0000ff" />
    <polygon points="47,-20 44,-26 50,-26" fill="#0000ff" />
    <text x="55" y="-27" font-size="11" fill="#0000ff" font-weight="bold">5.0</text>
  </g>
  
  <!-- Technical Annotations -->
  <g transform="translate(30, 480)" font-size="10.5" fill="#333333">
    <text x="0" y="0" font-weight="bold" font-size="11">ТЕХНИЧЕСКИЕ ПРИМЕЧАНИЯ:</text>
    <text x="0" y="18">1. Все размеры указаны в миллиметрах.</text>
    <text x="0" y="34">2. Допуски при 3D-печати для посадки: +/-0.2мм.</text>
    <text x="0" y="50">3. Боковые клипсы: повернуты на 90°, отступ 6.0мм от краев, по центру Z=0.0.</text>
  </g>
</svg>