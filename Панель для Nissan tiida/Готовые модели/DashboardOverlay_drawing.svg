<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%" style="background-color: #ffffff; font-family: 'Courier New', Courier, monospace;">
  <!-- Grid Background for Technical Look -->
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#f0f0f0" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#grid)" />

  <!-- Drawing Border -->
  <rect x="15" y="15" width="770" height="570" fill="none" stroke="#000000" stroke-width="2"/>
  <rect x="20" y="20" width="760" height="560" fill="none" stroke="#000000" stroke-width="0.5"/>

  <!-- TITLE BLOCK (Штамп чертежа) -->
  <g transform="translate(530, 480)">
    <rect width="250" height="100" fill="#ffffff" stroke="#000000" stroke-width="1.5"/>
    <line x1="0" y1="30" x2="250" y2="30" stroke="#000000" stroke-width="1"/>
    <line x1="0" y1="65" x2="250" y2="65" stroke="#000000" stroke-width="1"/>
    <line x1="125" y1="30" x2="125" y2="100" stroke="#000000" stroke-width="1"/>
    
    <text x="10" y="20" font-size="12" font-weight="bold" fill="#000000">Накладка Nissan Tiida</text>
    <text x="10" y="45" font-size="10" fill="#666666">РАЗРАБОТЧИК</text>
    <text x="10" y="58" font-size="11" font-weight="bold" fill="#000000">Antigravity AI</text>
    <text x="135" y="45" font-size="10" fill="#666666">ДАТА</text>
    <text x="135" y="58" font-size="11" font-weight="bold" fill="#000000">2026-06-04</text>
    <text x="10" y="80" font-size="10" fill="#666666">МАСШТАБ</text>
    <text x="10" y="93" font-size="11" font-weight="bold" fill="#000000">1:2 (A4)</text>
    <text x="135" y="80" font-size="10" fill="#666666">ТИП ДОК.</text>
    <text x="135" y="93" font-size="11" font-weight="bold" fill="#000000">ЧЕРТЕЖ ДЕТАЛИ</text>
  </g>

  <!-- VIEW 1: FRONT VIEW (Вид спереди) - Scale 2x -->
  <!-- Real: 293w (top), 287w (bottom), 26h. 2x Scale: 586w, 574w, 52h -->
  <!-- Center is X=300, Y=26 local coordinates. Top spans 7 to 593, Bottom spans 13 to 587 -->
  <g transform="translate(80, 240)">
    <text x="10" y="-35" font-size="14" font-weight="bold" fill="#000000">ВИД СПЕРЕДИ</text>
    
    <!-- Trapezoid Outline -->
    <polygon points="7,0 593,0 587,52 13,52" fill="none" stroke="#000000" stroke-width="2"/>
    
    <!-- Hidden Lines for Side Clips (Dashed) -->
    <!-- Centered vertically (Y=26px). Clip spans Z=16px to Z=36px (width 20px/10mm) -->
    <!-- Left side clip -->
    <rect x="22" y="16" width="10" height="20" fill="none" stroke="#999999" stroke-width="1" stroke-dasharray="3,3" />
    <!-- Right side clip -->
    <rect x="568" y="16" width="10" height="20" fill="none" stroke="#999999" stroke-width="1" stroke-dasharray="3,3" />

    <!-- Center Line -->
    <line x1="300" y1="-10" x2="300" y2="62" stroke="#ff0000" stroke-width="0.8" stroke-dasharray="10,2,2,2" />

    <!-- Dimensions for Front View -->
    <!-- Top Width: 293.0 -->
    <line x1="7" y1="-5" x2="7" y2="-25" stroke="#0000ff" stroke-width="0.8" />
    <line x1="593" y1="-5" x2="593" y2="-25" stroke="#0000ff" stroke-width="0.8" />
    <line x1="17" y1="-20" x2="583" y2="-20" stroke="#0000ff" stroke-width="0.8" />
    <polygon points="7,-20 17,-23 17,-17" fill="#0000ff" />
    <polygon points="593,-20 583,-23 583,-17" fill="#0000ff" />
    <text x="280" y="-25" font-size="11" fill="#0000ff" font-weight="bold">293.0</text>

    <!-- Bottom Width: 287.0 -->
    <line x1="13" y1="57" x2="13" y2="77" stroke="#0000ff" stroke-width="0.8" />
    <line x1="587" y1="57" x2="587" y2="77" stroke="#0000ff" stroke-width="0.8" />
    <line x1="23" y1="72" x2="577" y2="72" stroke="#0000ff" stroke-width="0.8" />
    <polygon points="13,72 23,69 23,75" fill="#0000ff" />
    <polygon points="587,72 577,69 577,75" fill="#0000ff" />
    <text x="280" y="84" font-size="11" fill="#0000ff" font-weight="bold">287.0</text>

    <!-- Height: 26.0 -->
    <line x1="603" y1="0" x2="623" y2="0" stroke="#0000ff" stroke-width="0.8" />
    <line x1="603" y1="52" x2="623" y2="52" stroke="#0000ff" stroke-width="0.8" />
    <line x1="618" y1="10" x2="618" y2="42" stroke="#0000ff" stroke-width="0.8" />
    <polygon points="618,0 615,10 621,10" fill="#0000ff" />
    <polygon points="618,52 615,42 621,42" fill="#0000ff" />
    <text x="628" y="31" font-size="11" fill="#0000ff" font-weight="bold">26.0</text>

    <!-- Slant Side: 26.2 -->
    <line x1="2" y1="10" x2="-13" y2="25" stroke="#0000ff" stroke-width="0.8" />
    <text x="-28" y="20" font-size="10.5" fill="#0000ff" font-weight="bold">26.2</text>
  </g>

  <!-- VIEW 2: TOP VIEW (Вид сверху) - Scale 2x -->
  <!-- Width: 586. Flat Panel. Clips extend UP (back faces Y=10) -->
  <g transform="translate(80, 110)">
    <text x="10" y="-25" font-size="14" font-weight="bold" fill="#000000">ВИД СВЕРХУ</text>
    
    <!-- Flat Panel Profile -->
    <path d="M 7,15 L 593,15 L 593,10 L 7,10 Z" fill="none" stroke="#000000" stroke-width="2"/>
    
    <!-- Left Side Clip extending upward (backwards) from back face at Y=10 -->
    <rect x="22" y="-6" width="10" height="16" fill="none" stroke="#000000" stroke-width="1.5" />
    <!-- Tooth pointing to the left -->
    <polygon points="22,0 12,-6 22,-6" fill="#000000" stroke="#000000" stroke-width="1"/>
    
    <!-- Right Side Clip extending upward (backwards) from back face at Y=10 -->
    <rect x="568" y="-6" width="10" height="16" fill="none" stroke="#000000" stroke-width="1.5" />
    <!-- Tooth pointing to the right -->
    <polygon points="578,0 588,-6 578,-6" fill="#000000" stroke="#000000" stroke-width="1"/>

    <!-- Center Line -->
    <line x1="300" y1="0" x2="300" y2="45" stroke="#ff0000" stroke-width="0.8" stroke-dasharray="10,2,2,2" />

    <!-- Dimensions for Top View -->
    <!-- Thickness: 2.5 -->
    <line x1="7" y1="10" x2="-13" y2="10" stroke="#0000ff" stroke-width="0.8" />
    <line x1="7" y1="15" x2="-13" y2="15" stroke="#0000ff" stroke-width="0.8" />
    <text x="-35" y="17" font-size="11" fill="#0000ff" font-weight="bold">2.5</text>
  </g>

  <!-- VIEW 3: DETAIL VIEW - CLIP (Деталь защелки) - Scale 4x -->
  <!-- Real: 8.0 length (32px), 5.0 thickness (20px), 5.0 hook (20px), 5.0 flat (20px), 10.0 width (40px) -->
  <g transform="translate(240, 420)">
    <text x="0" y="-68" font-size="14" font-weight="bold" fill="#000000">ДЕТАЛЬ КЛИПСЫ</text>
    
    <!-- Clip Profile with inner base chamfer and tooth insertion ramp -->
    <path d="M 10,0 L 18,0 L 10,-8 L 10,-32 L -30,-32 L -10,-20 L -10,0 Z" fill="none" stroke="#000000" stroke-width="2.5" />
    <!-- Panel attachment reference -->
    <line x1="-25" y1="0" x2="35" y2="0" stroke="#666666" stroke-width="1.5" stroke-dasharray="4,2"/>
    
    <!-- Dimensions for Clip -->
    <!-- Base Length: 8.0 -->
    <line x1="22" y1="0" x2="22" y2="-32" stroke="#0000ff" stroke-width="0.8" />
    <line x1="10" y1="0" x2="25" y2="0" stroke="#0000ff" stroke-width="0.8" />
    <line x1="10" y1="-32" x2="25" y2="-32" stroke="#0000ff" stroke-width="0.8" />
    <polygon points="22,0 19,-8 25,-8" fill="#0000ff" />
    <polygon points="22,-32 19,-24 25,-24" fill="#0000ff" />
    <text x="26" y="-12" font-size="11" fill="#0000ff" font-weight="bold">8.0</text>

    <!-- Flat length: 5.0 -->
    <line x1="-20" y1="0" x2="-20" y2="-20" stroke="#0000ff" stroke-width="0.8" />
    <line x1="-10" y1="0" x2="-23" y2="0" stroke="#0000ff" stroke-width="0.8" />
    <line x1="-10" y1="-20" x2="-23" y2="-20" stroke="#0000ff" stroke-width="0.8" />
    <polygon points="-20,0 -23,-5 -17,-5" fill="#0000ff" />
    <polygon points="-20,-20 -23,-15 -17,-15" fill="#0000ff" />
    <text x="-38" y="-7" font-size="11" fill="#0000ff" font-weight="bold">5.0</text>

    <!-- Clip base thickness: 5.0 -->
    <line x1="-10" y1="0" x2="-10" y2="15" stroke="#0000ff" stroke-width="0.8" />
    <line x1="10" y1="0" x2="10" y2="15" stroke="#0000ff" stroke-width="0.8" />
    <line x1="-10" y1="10" x2="10" y2="10" stroke="#0000ff" stroke-width="0.8" />
    <polygon points="-10,10 -2,7 -2,13" fill="#0000ff" />
    <polygon points="10,10 2,7 2,13" fill="#0000ff" />
    <text x="-10" y="25" font-size="11" fill="#0000ff" font-weight="bold">5.0 (ОСНОВАНИЕ)</text>

    <!-- Hook height: 5.0 -->
    <line x1="-10" y1="-20" x2="-10" y2="-45" stroke="#0000ff" stroke-width="0.8" stroke-dasharray="2,2" />
    <line x1="-30" y1="-32" x2="-30" y2="-45" stroke="#0000ff" stroke-width="0.8" stroke-dasharray="2,2" />
    <line x1="-10" y1="-40" x2="-30" y2="-40" stroke="#0000ff" stroke-width="0.8" />
    <polygon points="-10,-40 -18,-43 -18,-37" fill="#0000ff" />
    <polygon points="-30,-40 -22,-43 -22,-37" fill="#0000ff" />
    <text x="-24" y="-45" font-size="11" fill="#0000ff" font-weight="bold">5.0</text>

    <!-- Chamfer reinforcement width: 2.0 -->
    <line x1="10" y1="0" x2="10" y2="-15" stroke="#0000ff" stroke-width="0.8" stroke-dasharray="2,2" />
    <line x1="15" y1="0" x2="15" y2="-8" stroke="#0000ff" stroke-width="0.8" />
    <line x1="10" y1="-5" x2="15" y2="-5" stroke="#0000ff" stroke-width="0.8" />
    <text x="17" y="-3" font-size="10" fill="#0000ff" font-weight="bold">2.0</text>
  </g>
  
  <!-- Technical Annotations -->
  <g transform="translate(30, 480)" font-size="10.5" fill="#333333">
    <text x="0" y="0" font-weight="bold" font-size="11">ТЕХНИЧЕСКИЕ ПРИМЕЧАНИЯ:</text>
    <text x="0" y="18">1. Все размеры указаны в миллиметрах.</text>
    <text x="0" y="34">2. Допуски при 3D-печати для посадки: +/-0.2мм.</text>
    <text x="0" y="50">3. Боковые клипсы: повернуты на 90°, отступ 6.0мм от краев, по центру Z=0.0.</text>
  </g>
</svg>